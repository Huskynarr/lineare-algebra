name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate deploy source
        run: |
          node --check app.js
          node --check app.math.js
          node --check app.tools.js
          node --check app.progress.js
          node --check app.quiz.js
          node --check app.viz.js
          node --check app.render.js
          node --check service-worker.js
          node --check data/learningPath.js
          node tools/validate-content.js
          node -e "JSON.parse(require('fs').readFileSync('manifest.webmanifest','utf8'))"
          node -e "const fs=require('fs'); const html=fs.readFileSync('index.html','utf8'); [...html.matchAll(/<script type=\"application\\/ld\\+json\"[^>]*>([\\s\\S]*?)<\\/script>/g)].forEach((match)=>JSON.parse(match[1]));"
          node tools/gen-llms.js
          git diff --exit-code -- llms.txt llms-full.txt

      - name: Build static artifact
        run: |
          mkdir -p site
          rsync -av --delete ./ site \
            --exclude .git \
            --exclude .github \
            --exclude site \
            --exclude tools

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
