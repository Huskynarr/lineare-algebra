name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JavaScript syntax
        run: |
          node --check app.js
          node --check service-worker.js
          node --check data/learningPath.js

      - name: Validate web manifest
        run: |
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('manifest.webmanifest','utf8'));"
